<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>تشكيلة المنافذ التموينية الـ40,000 منفذ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{--blue:#378ADD;--coral:#D85A30;--teal:#1D9E75;--amber:#BA7517;--gray:#888780;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Tajawal",sans-serif;background:#fff;color:#2c2c2a;direction:rtl;}
  #root{padding:16px 20px 14px;}
  .hdr{border-right:3px solid #378ADD;padding-right:11px;margin-bottom:10px;}
  .tag{font-size:10px;font-weight:700;letter-spacing:.07em;color:var(--gray);margin-bottom:2px;}
  .title{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:2px;}
  .subtitle{font-size:12px;color:#5f5e5a;}
  .callout{background:#f1efe8;border-right:3px solid #378ADD;padding:8px 11px;font-size:12px;color:#5f5e5a;line-height:1.6;margin:9px 0;font-style:italic;}
  .chart-wrap{position:relative;width:100%;height:190px;}
  .source{font-size:10px;color:var(--gray);margin-top:10px;line-height:1.4;text-align:right;}
  @media(prefers-color-scheme:dark){body{background:#1a1a18;color:#d3d1c7;}.callout{background:#2c2c2a;color:#b4b2a9;}.subtitle,.source{color:#b4b2a9;}}
</style>
</head>
<body>
<div id="root">
  <div class="hdr">
    <p class="tag">زاوية ثالثة · إنفوجرافيك ① من ⑤</p>
    <p class="title">تشكيلة المنافذ التموينية الـ40,000 منفذ</p>
    <p class="subtitle">توزيع شبكة التموين حسب النوع</p>
  </div>
  <div class="callout">"75% من الشبكة هي بدالي تموين صغيرة — وهم من سيتحملون فاتورة التحول أمام الدولة"</div>
  
<div style="text-align:center;background:#eef4fb;border-radius:9px;padding:10px;margin-bottom:12px">
  <div style="font-size:11px;color:#5f5e5a;margin-bottom:2px">إجمالي المنافذ التموينية في مصر</div>
  <div style="font-size:28px;font-weight:800;color:#378ADD">~40,000 منفذ</div>
</div>
<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">
  <div style="position:relative;width:165px;height:165px;flex-shrink:0"><canvas id="c"></canvas></div>
  <div id="leg" style="display:flex;flex-direction:column;gap:11px;flex:1;min-width:120px"></div>
</div>
<script>
(function(){
  var dk=matchMedia("(prefers-color-scheme:dark)").matches;
  var blue=dk?"#85B7EB":"#378ADD",coral=dk?"#F0997B":"#D85A30",
      teal=dk?"#5DCAA5":"#1D9E75",amber=dk?"#FAC775":"#BA7517";
  var labels=["بدالي التموين","مشروع جمعيتي","منافذ الشركة القابضة","سيارات متنقلة"];
  var values=[30000,8500,1062,300];
  var pcts=["75%","21.3%","2.7%","0.75%"];
  var colors=[blue,coral,teal,amber];
  new Chart(document.getElementById("c"),{
    type:"doughnut",
    data:{labels:labels,datasets:[{data:values,backgroundColor:colors,borderWidth:3,borderColor:dk?"#1a1a18":"#fff",hoverOffset:6}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      cutout:"60%",
      animation:{animateRotate:true,animateScale:true,duration:1000,easing:"easeOutQuart"},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:dk?"#2c2c2a":"#fff",
          borderColor:dk?"rgba(255,255,255,.1)":"rgba(0,0,0,.08)",
          borderWidth:1,titleColor:dk?"#d3d1c7":"#2c2c2a",
          bodyColor:dk?"#b4b2a9":"#5f5e5a",padding:10,
          titleFont:{family:"Tajawal"},bodyFont:{family:"Tajawal"},
          callbacks:{label:function(c){return " "+c.label+": "+c.raw.toLocaleString("ar-EG")+" ("+pcts[c.dataIndex]+")";}}
        }
      }
    }
  });
  var leg=document.getElementById("leg");
  labels.forEach(function(l,i){
    leg.innerHTML+="<div style='display:flex;align-items:center;gap:8px'>"
      +"<span style='width:10px;height:10px;border-radius:2px;background:"+colors[i]+";flex-shrink:0'></span>"
      +"<div><div style='font-size:11px;color:#5f5e5a'>"+l+"</div>"
      +"<div style='font-size:15px;font-weight:700;color:"+colors[i]+"'>"+values[i].toLocaleString("ar-EG")
      +"<span style='font-size:11px;font-weight:400;color:#5f5e5a;margin-right:4px'>("+pcts[i]+")</span></div></div></div>";
  });
})();
</script>
  <p class="source">المصدر: مجلس الوزراء / تفنيد</p>
</div>
<script>
setTimeout(function(){
  var h=document.getElementById("root").offsetHeight;
  window.parent.postMessage({type:"chartResize",height:h},"*");
},1400);
</script>
</body></html>
